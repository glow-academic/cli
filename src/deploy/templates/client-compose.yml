# Glow client — blue/green stack.
#
# This compose lives in its own project (COMPOSE_PROJECT_NAME ends in
# `-client`) and is brought up by the CLI alongside the api stack in
# `airgapped` and `exposed` topologies. In `api_only` topology the CLI
# never writes or starts this stack.
#
# All env vars come from `.env` next to this file (rendered by
# env::render_client per the topology decision table).

services:
  app-blue:
    image: ghcr.io/glow-academic/client:${CLIENT_VERSION:?CLIENT_VERSION required}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE}
      - INTERNAL_API_BASE=${INTERNAL_API_BASE}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID}
      - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET}
      - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-glow-default-client}"
    networks:
      - glow-net

  app-green:
    image: ghcr.io/glow-academic/client:${CLIENT_VERSION:?CLIENT_VERSION required}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE}
      - INTERNAL_API_BASE=${INTERNAL_API_BASE}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_KEYCLOAK_ID=${AUTH_KEYCLOAK_ID}
      - AUTH_KEYCLOAK_SECRET=${AUTH_KEYCLOAK_SECRET}
      - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-glow-default-client}"
    networks:
      - glow-net

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-glow-default-client}-nginx
    restart: unless-stopped
    depends_on:
      - app-blue
      - app-green
    ports:
      - "${CLIENT_HTTP_PORT:-80}:80"
    environment:
      - ACTIVE_ENV=${ACTIVE_CLIENT_ENV:-blue}
      # In airgapped mode this is the api stack's nginx alias on the
      # shared network (e.g. `glow-default-nginx:80`). Client nginx
      # proxies /auth/, /api/, /mcp/, /socket.io/ through here.
      - MCP_BACKEND=${MCP_BACKEND:-glow-default-nginx:80}
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./upstreams.conf:/etc/nginx/conf.d/upstreams.conf
    networks:
      - glow-net

  docker-gen:
    image: nginxproxy/docker-gen:latest
    restart: unless-stopped
    command: -notify-sighup ${COMPOSE_PROJECT_NAME:-glow-default-client}-nginx -watch /etc/docker-gen/templates/upstreams.tmpl /etc/nginx/conf.d/upstreams.conf
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-glow-default-client}
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./upstreams.tmpl:/etc/docker-gen/templates/upstreams.tmpl:ro
      - ./upstreams.conf:/etc/nginx/conf.d/upstreams.conf
    depends_on:
      - nginx
    networks:
      - glow-net

networks:
  # External so the api stack can join it too — this is how the
  # client nginx reaches the api nginx by name in airgapped mode.
  # CLI creates it before either stack comes up.
  glow-net:
    external: true
    name: ${GLOW_NETWORK:-glow-default-net}
