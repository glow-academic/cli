name: Pipeline

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: Test ───────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip tests]')"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  # ── Stage 2: Release ────────────────────────────────────────
  release:
    needs: test
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "beta" ]; then
            TAG="v${VERSION}-beta"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
            echo "released=false" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG not found — will build"
            echo "released=true" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (idempotent)
        if: steps.check.outputs.released == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          fi

  # ── Stage 3: Build ──────────────────────────────────────────
  build:
    needs: release
    if: needs.release.outputs.released == 'true'
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ github.ref_name }}" = "beta" ]; then
            cp glow glow-beta
            cp glw glw-beta
            tar czf ../../../glow-${{ matrix.target }}.tar.gz glow-beta glw-beta
          else
            tar czf ../../../glow-${{ matrix.target }}.tar.gz glow glw
          fi
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          if ("${{ github.ref_name }}" -eq "beta") {
            Copy-Item glow.exe glow-beta.exe
            Copy-Item glw.exe glw-beta.exe
            7z a ../../../glow-${{ matrix.target }}.zip glow-beta.exe glw-beta.exe
          } else {
            7z a ../../../glow-${{ matrix.target }}.zip glow.exe glw.exe
          }
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: glow-${{ matrix.target }}
          path: glow-${{ matrix.target }}.*

  # ── Stage 4: Publish ────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate cli-spec.json
        run: |
          tar xzf artifacts/glow-x86_64-unknown-linux-gnu.tar.gz -C /tmp
          if [ "${{ github.ref_name }}" = "beta" ]; then
            BIN="/tmp/glow-beta"
          else
            BIN="/tmp/glow"
          fi
          chmod +x "$BIN"
          "$BIN" --dump-cli-spec > artifacts/cli-spec.json 2>/dev/null || echo '{}' > artifacts/cli-spec.json

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          PRERELEASE=""
          if [ "${{ github.ref_name }}" = "beta" ]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" artifacts/* \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE
          echo "Created release $TAG"

      - name: Generate app token for Homebrew tap
        id: app-token
        # Org-owned GitHub App with `contents: write` + `actions: write`
        # on glow-academic/tap. See README for setup instructions.
        # If DEPLOY_APP_ID isn't set yet (first run before App is
        # installed), this step will fail loudly — that's intentional;
        # set up the App + secrets and re-run, don't paper over it.
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: glow-academic
          repositories: tap

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          TAG="${{ needs.release.outputs.tag }}"
          BRANCH="${{ github.ref_name }}"

          if [ "$BRANCH" = "beta" ]; then
            FORMULA="glow-beta"
            # Tarballs are always named glow-<target>.tar.gz (the `-beta` suffix
            # is only on the binaries *inside*); the formula name is glow-beta,
            # but the artifact prefix is plain glow.
            TARBALL_PREFIX="glow"
          else
            FORMULA="glow"
            TARBALL_PREFIX="glow"
          fi

          SHA_ARM_MAC=$(shasum -a 256 artifacts/${TARBALL_PREFIX}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_MAC=$(shasum -a 256 artifacts/${TARBALL_PREFIX}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_LINUX=$(shasum -a 256 artifacts/${TARBALL_PREFIX}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          gh workflow run update-formula.yml \
            -R glow-academic/tap \
            -f formula="$FORMULA" \
            -f version="$VERSION" \
            -f tag="$TAG" \
            -f sha_arm_mac="$SHA_ARM_MAC" \
            -f sha_x86_mac="$SHA_X86_MAC" \
            -f sha_x86_linux="$SHA_X86_LINUX"

          echo "Dispatched formula update for $FORMULA $TAG to glow-academic/tap"

      - name: Build and push Docker image
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          BRANCH="${{ github.ref_name }}"

          tar xzf artifacts/glow-x86_64-unknown-linux-gnu.tar.gz -C /tmp
          if [ "$BRANCH" = "beta" ]; then
            cp /tmp/glow-beta ./glow
          else
            cp /tmp/glow .
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build --label "org.opencontainers.image.source=https://github.com/glow-academic/cli" -t ghcr.io/glow-academic/cli:${TAG} .
          docker push ghcr.io/glow-academic/cli:${TAG}

          # Rolling tag: latest for main, beta for beta
          if [ "$BRANCH" = "main" ]; then
            docker tag ghcr.io/glow-academic/cli:${TAG} ghcr.io/glow-academic/cli:latest
            docker push ghcr.io/glow-academic/cli:latest
          else
            docker tag ghcr.io/glow-academic/cli:${TAG} ghcr.io/glow-academic/cli:beta
            docker push ghcr.io/glow-academic/cli:beta
          fi
          rm glow
